# Celery task queue environment
#
# Services:
#   api      - FastAPI app, publishes tasks via Celery
#   worker   - Celery worker, consumes tasks, reads/writes MinIO
#   rabbitmq - Message broker (Celery transport)
#   redis    - Result backend (Celery results cache)
#   minio    - S3-compatible object storage
#
# Internal network (no ports needed for inter-service communication)
# Only api:8000 is exposed for host access.
# Default credentials in .env or compose defaults (user/pass/root).
services:
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    environment:
      BROKER_URL: amqp://${RABBITMQ_USER:-user}:${RABBITMQ_PASSWORD:-pass}@rabbitmq:5672//
      BACKEND_URL: redis://:${REDIS_PASSWORD:-pass}@redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pass}
    depends_on:
      - rabbitmq
      - redis
      - minio

  worker:
    build:
      context: ./worker
    environment:
      BROKER_URL: amqp://${RABBITMQ_USER:-user}:${RABBITMQ_PASSWORD:-pass}@rabbitmq:5672//
      BACKEND_URL: redis://:${REDIS_PASSWORD:-pass}@redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pass}
    depends_on:
      - rabbitmq
      - redis
      - minio
    restart: unless-stopped

  # Message Queue
  rabbitmq:
    image: rabbitmq:alpine
    #ports:
    #  - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Storage
  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-pass}
    #ports:
    #  - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-pass}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pass}
    volumes:
      - minio_data:/data
    #ports:
    #  - "9000:9000"
    #  - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  redis_data:
  minio_data:

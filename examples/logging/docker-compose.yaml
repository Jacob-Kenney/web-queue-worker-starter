# Centralized logging with EFK stack (Fluentd → Elasticsearch → Kibana)
#
# All services route logs through Fluentd via Docker's fluentd logging driver.
# Fluentd forwards to Elasticsearch for storage; Kibana provides visualization.
# Only Kibana (5601) is exposed for host access to the web UI.

# YAML Anchor for logging
x-logging: &logging
  driver: "fluentd"
  options:
    fluentd-address: fluentd:24224
    tag: "docker-{{.Name}}-{{.ShortID}}"

services:
  api:
    build:
      context: ./api
    ports:
      - "8000:8000"
    environment:
      BROKER_URL: amqp://${RABBITMQ_USER:-user}:${RABBITMQ_PASSWORD:-pass}@rabbitmq:5672//
      BACKEND_URL: redis://:${REDIS_PASSWORD:-pass}@redis:6379/0
    depends_on:
      - rabbitmq
      - redis
    logging: *logging

  worker:
    build:
      context: ./worker
    environment:
      BROKER_URL: amqp://${RABBITMQ_USER:-user}:${RABBITMQ_PASSWORD:-pass}@rabbitmq:5672//
      BACKEND_URL: redis://:${REDIS_PASSWORD:-pass}@redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pass}
    depends_on:
      - rabbitmq
      - redis
      - minio
    restart: unless-stopped
    logging: *logging

  # Message Queue
  rabbitmq:
    image: rabbitmq:alpine
    #ports:
    #  - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging

  # Storage
  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-pass}
    #ports:
    #  - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-pass}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    #ports:
    #  - "9000:9000"
    #  - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pass}
    volumes:
      - minio_data:/data
    logging: *logging

  # Logging
  # On AWS, logging could be: cloudwatch, opentelemetry, prometheus, grafana
  fluentd:
    build: ./fluentd
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      - ./fluentd:/fluentd/etc
    depends_on:
      elasticsearch:
        condition: service_healthy

  elasticsearch:
    image: elasticsearch:9.4.2
    environment:
      - discovery.type=single-node
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      retries: 5
      timeout: 5s

  kibana:
    image: kibana:9.4.2
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  rabbitmq_data:
  redis_data:
  minio_data:
